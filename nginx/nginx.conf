server {
    listen 80;
    server_name _;

    # Django API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    # Django admin panel
    location /django-admin/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Django static files (collectstatic)
    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Django media files
    location /media/ {
        alias   /app/media/;
    }

    # React app assets (hashed filenames – cache aggressively)
    location /assets/ {
        alias   /usr/share/nginx/html/react/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA routes
    location ~ ^/(login|zapisz-sie|admin) {
        root      /usr/share/nginx/html/react;
        try_files $uri /index.html;
    }

    # Landing page static assets (logomc.svg, logo.png, pic/, …)
    location ~ \.(svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        root /usr/share/nginx/html/landing;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Landing page
    location / {
        root      /usr/share/nginx/html/landing;
        try_files $uri $uri/ /index.html;
    }
}
